<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Secret Encoder</title>

<style>
*{box-sizing:border-box}

body{
background:#0a0a0a;
color:#00ff88;
font-family:monospace;
text-align:center;
margin:0;
padding:20px;
}

.container{
max-width:700px;
width:100%;
margin:auto;
background:#111;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,255,136,0.2);
}

textarea,input{
width:100%;
padding:12px;
margin:10px 0;
background:#000;
color:#00ff88;
border:1px solid #00ff88;
border-radius:6px;
font-size:14px;
}

button{
background:#00ff88;
border:none;
padding:12px;
width:100%;
font-weight:bold;
cursor:pointer;
margin-top:8px;
border-radius:6px;
font-size:15px;
}

button:hover{
background:#00cc6f;
}

.result{
background:#000;
padding:15px;
margin-top:15px;
word-break:break-all;
border-radius:6px;
min-height:40px;
}

hr{
margin:25px 0;
border:0;
border-top:1px solid #00ff88;
opacity:0.3;
}

.footer{
margin-top:30px;
font-size:13px;
opacity:0.7;
}

@media (max-width:600px){

.container{
padding:18px;
}

h2{font-size:20px}
h3{font-size:16px}

textarea,input{font-size:13px}
button{font-size:14px}

}
</style>
</head>

<body>

<div class="container">

<h2>🔐 Emoji Hidden Message Tool</h2>

<h3>Hide Message</h3>

<input id="emojiInput" placeholder="Visible emojis (ex: 😎🔥)" />

<textarea id="secretInput" placeholder="Secret message"></textarea>

<button onclick="encode()">Encrypt</button>

<div class="result" id="encoded"></div>

<button onclick="copyEncoded()">📋 Copy Encrypted Emojis</button>

<hr>

<h3>Reveal Message</h3>

<textarea id="decodeInput" placeholder="Paste encoded emojis"></textarea>

<button onclick="decode()">Decrypt</button>

<div class="result" id="decoded"></div>

</div>

<div class="footer">
Made by <b>Vansh Saxena</b> • just for fun 😄
</div>

<script>

// Variation Selector base
const VS_BASE = 0xE0100;

// encode text → variation selectors
function encode(){

let emojis=document.getElementById("emojiInput").value;
let secret=document.getElementById("secretInput").value;

let encoded=emojis;

for(let i=0;i<secret.length;i++){

let code=secret.charCodeAt(i);

encoded+=String.fromCodePoint(VS_BASE + code);

}

document.getElementById("encoded").innerText=encoded;

}

// decode variation selectors → text
function decode(){

let input=document.getElementById("decodeInput").value;

let message="";

for(let char of input){

let code=char.codePointAt(0);

if(code>=VS_BASE && code<=VS_BASE+255){

message+=String.fromCharCode(code - VS_BASE);

}

}

document.getElementById("decoded").innerText=message || "No hidden message found";

}

// copy button
function copyEncoded(){

let text=document.getElementById("encoded").innerText;

navigator.clipboard.writeText(text).then(()=>{
alert("Encrypted emojis copied!");
});

}

</script>

</body>
</html>
